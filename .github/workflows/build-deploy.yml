name: Build and Deploy Java Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ayoubdahir/alihsan-java-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: AyoubDahir/argocd
          ref: main
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}
          path: argocd

      - name: Update Java backend image tag
        run: |
          set -euo pipefail
          FILE="argocd/erpnext-gitops/system/alihsan-java-backend/deployment.yaml"
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          REPO="ghcr.io/${{ env.IMAGE_NAME }}"

          if [ ! -f "$FILE" ]; then
            echo "Deployment file not found: $FILE"
            exit 1
          fi

          python - <<'PY'
          import os
          from pathlib import Path

          path = Path("argocd/erpnext-gitops/system/alihsan-java-backend/deployment.yaml")
          tag = os.environ["TAG"]
          repo = os.environ["REPO"]
          text = path.read_text(encoding="utf-8")

          marker = "image: "
          out_lines = []
          replaced = False
          for line in text.splitlines():
              stripped = line.strip()
              if stripped.startswith(marker) and "alihsan-java-backend" in stripped:
                  indent = line[: len(line) - len(line.lstrip())]
                  out_lines.append(f"{indent}image: {repo}:{tag}")
                  replaced = True
              else:
                  out_lines.append(line)

          if not replaced:
              raise SystemExit("Could not find Java backend image line to replace")

          path.write_text("\n".join(out_lines) + "\n", encoding="utf-8")
          PY
        env:
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          REPO: ghcr.io/${{ env.IMAGE_NAME }}

      - name: Commit and push GitOps change
        run: |
          set -euo pipefail
          cd argocd

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add erpnext-gitops/system/alihsan-java-backend/deployment.yaml
          if git diff --cached --quiet; then
            echo "No GitOps changes to commit"
            exit 0
          fi

          git commit -m "ci: deploy alihsan-java-backend:${{ needs.build-and-push.outputs.image_tag }}"
          git push origin main
